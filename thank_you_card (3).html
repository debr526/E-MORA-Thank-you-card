<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You Card Design</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f0ebe3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    font-family: 'Jost', sans-serif;
    padding: 40px 20px;
  }

  .label {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.58rem;
    color: #a09890;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 8px;
  }

  .card-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .card {
    width: min(380px, 82vw);
    aspect-ratio: 7 / 5;
    border-radius: 4px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.15), 0 3px 10px rgba(0,0,0,0.08);
    position: relative;
    overflow: hidden;
  }

  /* ── FRONT ── */
  .front {
    background: #faf9f7;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 8% 10%;
    width: 100%;
    height: 100%;
  }

  .stamp {
    position: absolute;
    top: 4%;
    right: 3%;
  }

  .greeting-hey {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2.4rem, 8vw, 3.4rem);
    color: #1a1a18;
    font-weight: 400;
    display: flex;
    align-items: flex-end;
    gap: 6px;
    margin-bottom: 4px;
    margin-top: clamp(70px, 16vw, 90px);
  }

  .blank-line {
    display: inline-block;
    border-bottom: 1.5px solid #1a1a18;
    width: clamp(160px, 34vw, 220px);
    margin-bottom: 8px;
  }

  .greeting-sub {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: #1a1a18;
    font-weight: 400;
    margin-left: clamp(60px, 14vw, 100px);
    margin-top: clamp(2px, 0.5vw, 4px);
    white-space: nowrap;
  }

  /* ── BACK ── */
  .back {
    align-items: center;
    text-align: center;
    background: #d4cfc6;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 7% 9%; align-items: center;
    gap: 5px;
    width: 100%;
    height: 100%;
  }

  .thank-you {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(2rem, 6.5vw, 2.8rem);
    color: #1a1a18;
    line-height: 1;
    margin-bottom: 2px;
  }

  .hearts {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(0.9rem, 3.2vw, 1.2rem);
    color: #1a1a18;
    margin-bottom: 6px;
  }

  .message {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: clamp(0.55rem, 1.8vw, 0.72rem);
    color: #1a1a18;
    line-height: 1.6;
    margin-bottom: 8px;
    white-space: nowrap;
  }

  .connect {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(0.9rem, 3vw, 1.2rem);
    color: #1a1a18;
    margin-bottom: 5px;
  }

  .social-icons {
    display: flex;
    justify-content: center;
    gap: 12px;
    align-items: center;
    margin-bottom: 8px;
  }

  .love {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.1rem, 3.8vw, 1.5rem);
    color: #1a1a18;
    margin-top: 2px;
  }
</style>
</head>
<body>

  <!-- FRONT CARD -->
  <div class="card-wrap">
    <p class="label">Front</p>
    <div class="card">
      <div class="front">
        <div class="stamp">
          <svg viewBox="0 0 80 80" width="68" height="68">
            <path id="circlePath" d="M 40,40 m -28,0 a 28,28 0 1,1 56,0 a 28,28 0 1,1 -56,0" fill="none"/>
            <text style="font-family:'Jost',sans-serif;font-size:9.5px;font-weight:300;letter-spacing:3.2px;fill:#1a1a18">
              <textPath href="#circlePath">THANK YOU FOR YOUR ORDER •</textPath>
            </text>
            <text x="40" y="46" text-anchor="middle" style="font-size:16px;fill:#1a1a18">♥</text>
          </svg>
        </div>
        <div class="greeting-hey">
          <span>Hey</span>
          <span class="blank-line"></span>
          <span>,</span>
        </div>
        <div class="greeting-sub">you made our day!</div>
      </div>
    </div>
  </div>

  <!-- BACK CARD -->
  <div class="card-wrap">
    <p class="label">Back</p>
    <div class="card">
      <div class="back">
        <div class="thank-you">thank you.</div>
        <div class="hearts">from the bottom of our hearts!</div>
        <div class="message">We hope you love your item as much as we loved picking it for you!</div>
        <div class="connect">connect with us!</div>
        <div class="social-icons">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm4.93 6.77-1.9 8.96c-.14.62-.5.77-.99.48l-2.74-2.02-1.32 1.27c-.15.15-.27.27-.55.27l.2-2.78 5.08-4.59c.22-.2-.05-.3-.34-.11L8.17 14.3l-2.7-.84c-.59-.18-.6-.59.12-.87l10.54-4.06c.49-.18.92.12.8.87v-.68z" fill="#1a1a18"/>
          </svg>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <rect x="2" y="2" width="20" height="20" rx="5.5" stroke="#1a1a18" stroke-width="1.6"/>
            <circle cx="12" cy="12" r="4.5" stroke="#1a1a18" stroke-width="1.6"/>
            <circle cx="17.5" cy="6.5" r="1" fill="#1a1a18"/>
          </svg>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1a1a18">
            <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/>
          </svg>
        </div>
        <div class="love">love your purchase? let us know</div>
      </div>
    </div>
  </div>

</body>
</html>
